<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Digital Clock</title>

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: antiquewhite;
        }

        .container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #curTime {
            font-size: 80px;
            font-weight: bold;
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>

</head>

<body>

    <div class="container">

        <div id="curTime">
            Time will display here
        </div>

    </div>

    <script>

        setInterval(() => {
            document.getElementById("curTime").innerHTML =
                new Date().toLocaleTimeString();
        }, 1000);

    </script>

</body>

</html>
